name: CitroenConnectedCamera

options:
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

configFiles:
  Debug: Config/App.xcconfig
  Release: Config/App.xcconfig

packages:
  VIRBKit:
    path: Packages/VIRBKit
  AppCore:
    path: Packages/AppCore
  CoreUI:
    path: Packages/CoreUI

targets:
  CitroenConnectedCamera:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App/App
      - path: App/Resources
    dependencies:
      - package: VIRBKit
      - package: AppCore
      - package: CoreUI
    settings:
      base:
        # PRODUCT_BUNDLE_IDENTIFIER comes from Config/App.xcconfig (overridable via Secrets.xcconfig).
        PRODUCT_NAME: CitroenConnectedCamera
        # iPhone only (family 1): a portrait phone companion app, so the iPad "support all
        # orientations unless full screen" rule doesn't apply.
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: App/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/App/CitroenConnectedCamera.entitlements
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_VERSION: "6.0"
