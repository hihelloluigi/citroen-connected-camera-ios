reporter: "xcode"

included:
  - Packages/VIRBKit/Sources
  - Packages/AppCore/Sources
  - Packages/CoreUI/Sources
  - App/App

# force_unwrapping is opt-in; it must be enabled before its severity takes effect.
opt_in_rules:
  - force_unwrapping

force_unwrapping: error
force_try: error

line_length:
  warning: 160
  error: 220

identifier_name:
  min_length: { warning: 2, error: 1 }
  excluded: ["id", "x", "y", "i", "j"]

disabled_rules:
  - todo
